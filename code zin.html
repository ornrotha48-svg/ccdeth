<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Do You Love Me?</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      .container {
        text-align: center;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
      }

      .buttons {
        margin-right: 145px;
        position: relative;
        display: inline-block;
      }

      button {
        width: 110px;
        padding: 5px 0;
        font-size: 25px;
        border: none;
        border-radius: 15px;
        letter-spacing: 2px;
        cursor: pointer;
      }

      #yesBtn {
        background: #28a745;
        color: white;
      }

      #noBtn {
        background: #dc3545;
        color: white;
        position: absolute;
        left: 120px;
        top: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Do you love me? ❤️</h1>
      <div class="buttons">
        <button id="yesBtn" onclick="sayYes()">yes😍</button>
        <button id="noBtn">no😢</button>
      </div>
    </div>

    <script>
      const notBtn = document.querySelector("#noBtn");
      let isFixed = false;

      notBtn.addEventListener("mouseenter", moveButton);

      function moveButton(e) {
        const padding = 20;
        const maxX = window.innerWidth - noBtn.offsetWidth - padding;
        const maxY = window.innerHeight - noBtn.offsetHeight - padding;

        let newX, newY;
        while (true) {
          newX = Math.random() * maxX;
          newY = Math.random() * maxY;

          if ((newX - e.clientX) ** 2 + (newY - e.clientY) ** 2 >= 150 * 150) {
            break;
          }
        }
        if (!isFixed) {
          const rect = notBtn.getBoundingClientRect();
          noBtn.style.position = "fixed";
          notBtn.style.left = rect.left + "px";
          notBtn.style.top = rect.top + "px";

          noBtn.offsetHeight;
          noBtn.style.transition = "left 0.3s ease, top 0.3s ease";

          isFixed = true;
        }

        notBtn.style.left = newX + "px";
        notBtn.style.top = newY + "px";
      }
      function sayYes() {
        alert("I knew it!");
      }
    </script>
  </body>
</html>
